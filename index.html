<!-- Final Project: Pomodoro/To-do list app -->
<!-- index.html -->

<!DOCTYPE html>
<html lang="en"> <!-- Tells which language the content of the page is written in. -->

    <!-- Head section -->
  <head>
    <meta charset="UTF-8"> <!-- Enables the website to handle a large range of characters. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the website look good in different devices. -->
    <title>MatoTask | Web App</title> <!-- Random tagline that appears below the title. -->       
    <link rel="icon" type="img/png" href="assets/img/tomato-icon-1.png"> <!-- Displays the web app icon. -->
    <!-- Font links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet"> <!-- Links to the styles.css -->
  </head>
    <!-- Body section -->
  <body>
    <main>
        <!-- Heading section -->
      <section class="heading-container">
        <div class="heading-content">
          <h1 id="title">MatoTask <img id="tomato-icon" src="assets/img/tomato-icon-1.png" width="48"></h1> <!-- Website's title -->
          <div class="highlight-box">
            <p id="random-tagline">Loading...</p> <!-- Displays a random tagline. -->
          </div>
        </div>
      <!-- Timer section -->
      </section> 
      <section class="timer-container">
        <div class="timer-content">
          <!-- Timer settings -->
          <div class="timer-settings">
            <input type="number" id="minutes-input" placeholder="Min ⏱️" min="1" max="60"> <!-- Allows the user to input the timer minutes. -->
            <button id="set-button">Set Time</button> <!-- Displays a set time button. -->
          </div>
          <!-- Timer -->
          <div id="timer-display"><span >25:00</span></div> <!-- Displays the deafult time. -->
          <!-- Buttons -->
          <div class="button-group">
            <button id="start-button"><img src="assets/img/start-icon.png" align="center" width="24"> Start</button> <!-- Displays a start button. -->
            <button id="stop-button"><img src="assets/img/pause-icon.png" align="center" width="24"> Pause</button> <!-- Displays a stop button. -->
            <button id="reset-button"><img src="assets/img/restart-icon.png" align="center" width="24"> Reset</button> <!-- Displays a reset button. -->
          </div>
        </div>
      </section>
          <!-- Task list form -->
      <section class="task-container">
        <div class="task-content">
          <div class="task-form"> <!-- Displays a form with a submit button. -->
            <form> 
              <input type="text" id="task-input" placeholder="Add a new task 📝" required /> <!-- Allows the user to input a task. -->
              <button type="submit" id="submit-button">Add Task</button> <!-- Displays an add task button. -->
            </form>
          </div>
          <!-- Task list -->
          <div class="task-group">
            <ul id="task-list"></ul> <!-- Displays unordered task list. -->
          </div>
          <!-- Credits -->
          <div class="credits-group">
            <p id="credits">Made with 💖 by shercodes</p>
            <p>&#169;MatoTask 2026. All Rights Reserved.</p> <!-- Displays the credits of the web app. -->
          </div>
        </div>
      </section>
      <script src="script.js"></script> <!-- Links to the script.js -->
    </main>
  </body>
</html>
