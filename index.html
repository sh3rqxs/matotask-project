<!-- Final Project: Pomodoro/To-do list app -->
<!-- index.html -->

<!DOCTYPE html>
<html lang="en"> <!-- Tells which language the content of the page is written in. -->

    <!-- Head section -->
  <head>
    <meta charset="UTF-8"> <!-- Enables the website to handle a large range of characters. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the website look good on movile devices. -->
    <title>MatoTask | Web App</title> <!-- Webpage name tag that appears in the browser tab. -->       
    <link rel="icon" type="img/png" href="https://hexmos.com/freedevtools/public/emojis/tomato/apple-emojis/tomato_1f345_iOS_11.1.png"> <!-- Displays the web app icon. -->
    <!-- Font links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet"> <!-- Links to the styles.css -->
  </head>
    <!-- Body section -->
  <body>
    <main>
        <!-- Heading section -->
      <section class="heading-container">
        <div class="heading-content">
          <h1 id="title">MatoTask</h1> <!-- Website's title -->
          <div class="highlight-box">
            <p id="random-tagline">Loading...</p> <!-- Displays a random tagline. -->
          </div>
        </div>
      <!-- Timer section -->
      </section> 
      <section class="timer-container">
        <div class="timer-content">
          <!-- Timer -->
          <div id="timer-display"><span >25:00</span></div> <!-- Displays the deafult time. -->
          <!-- Timer settings -->
          <div class="config">
            <input type="number" id="minutes-input" placeholder="Min ⏱️" min="1" max="60" /> <!-- Allows the user to input the timer minutes. -->
            <button id="set-button">Set Time</button> <!-- Displays a set time button. -->
          </div>
          <!-- Buttons -->
          <div class="button-group">
            <button id="start-button">Start</button> <!-- Displays a start button. -->
            <button id="stop-button">Stop</button> <!-- Displays a stop button. -->
            <button id="reset-button">Reset</button> <!-- Displays a reset button. -->
          </div>
          <!-- Task list form -->
          <div class="task-group">
            <form id="task-form"> <!-- Displays a form with a submit button. -->
              <input type="text" id="task-input" placeholder="Add a new task 📝" required /> <!-- Allows the user to input a task. -->
              <button type="submit" id="submit-button">Add Task</button> <!-- Displays an add task button -->
            </form>
          </div>
          <!-- Task list -->
          <div class="task-group">
            <ul id="task-list"></ul> <!-- Displays unordered task list. -->
          </div>
          <!-- Credits -->
          <div class="credits-groups">
            <p id="credits">Made with 💖 by shercodes</p> <!-- Displays the credits of the web app. -->
          </div>
        </div>
      </section>
        <script src="script.js"></script> <!-- Links to the script.js -->
            
        </main>
    </body>
</html>
